mode = "split"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-iam-app-api"
workspace = "sdkwork-appbase"
sdkFamily = "sdkwork-iam-app-sdk"
apiAuthority = "sdkwork-iam-app-api"
surface = "app"
apiPrefix = "/app/v3/api"
runtimeMode = "split-or-embedded"
sameOriginAllowed = true
executableExport = "sdkwork_routes_iam_app_api::build_sdkwork_iam_app_api_router"
cargoFeature = "foundation-appbase"
cargoDependency = "sdkwork_routes_iam_app_api"
coverage = "appbase-iam-routes"
requiredBaseUrlKey = "SDKWORK_APPBASE_APP_API_BASE_URL"

[[dependencySurfaces]]
serviceId = "sdkwork-mail-app-api"
workspace = "sdkwork-mail"
sdkFamily = "sdkwork-mail-app-sdk"
apiAuthority = "sdkwork-mail-app-api"
surface = "app"
apiPrefix = "/app/v3/api/Mail"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "sdkwork_mail_APPLICATION_PUBLIC_HTTP_URL"
coverage = "Mail-app-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-mail-backend-api"
workspace = "sdkwork-mail"
sdkFamily = "sdkwork-mail-backend-sdk"
apiAuthority = "sdkwork-mail-backend-api"
surface = "backend"
apiPrefix = "/backend/v3/api/Mail"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "sdkwork_mail_APPLICATION_PUBLIC_HTTP_URL"
coverage = "Mail-backend-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-mail-app-api"
baseUrl = "http://sdkwork-mail-standalone-gateway:18090"

[[upstreams]]
serviceId = "sdkwork-mail-backend-api"
baseUrl = "http://sdkwork-mail-standalone-gateway:18090"

[cors]
allowAnyOrigin = false
allowedOrigins = [
  "https://Mail.sdkwork.com",
  "https://api.sdkwork.com",
]

[request]
maxBodyBytes = 33554432
timeoutMs = 0

[readiness]
checkUpstreams = false
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = false
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = []
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = false

[security.waf]
enabled = false
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = false
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = false
maxAttempts = 1
retryStatuses = [502, 503, 504]
retryBackoffMs = 0
circuitBreakerEnabled = false
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
